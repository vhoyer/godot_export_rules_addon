name: Tests

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Godot ${{ matrix.godot-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        godot-version:
          - 4.0.4
          - 4.1.4
          - 4.2.2
          - 4.3.0
          - 4.4.0
          - 4.5.1
          - 4.6.1
          - 4.7.0
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ matrix.godot-version }}
          use-dotnet: false
          include-templates: false

      - name: Import project assets
        run: godot --headless --import || true

      - name: Run GUT tests
        run: >
          godot --headless
          -s addons/gut/gut_cmdln.gd
          --
          -gdir=res://test/unit
          -gdir=res://test/e2e
          -gexit
