name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bundle LICENSE
        run: cp LICENSE addons/export_rules/LICENSE

      - name: Create zip
        run: zip -r export_rules.zip addons/export_rules

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: export_rules.zip
